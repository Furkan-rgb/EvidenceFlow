name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: uv python install 3.12.13
      - run: uv lock --check
      - run: uv sync --locked --all-extras --dev
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest -m "not ollama"
      - run: npm test
